name: ${STACK_NAME:-wordsmith}

services:
  db:
    image: docker.io/rekimete/wordsmith-db:latest
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  words:
    image: docker.io/rekimete/wordsmith-words:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/postgres

  web:
    image: docker.io/rekimete/wordsmith-web:latest
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - words
    environment:
      - WORDS_API=http://words:8080

volumes:
  db-data:

