name: Build and push Wordsmith images

on:
  pull_request:
    types: [labeled]

env:
  # Registry base (uses Docker Hub namespace from secret). You can change this to another registry if needed.
  REGISTRY: docker.io/${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_PREFIX: wordsmith

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Build each service in parallel
    strategy:
      matrix:
        service: [web, words, db]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push image for ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.run_number }}

      - name: Image list (debug)
        if: ${{ always() }}
        run: |
          echo "Built image tags for service=${{ matrix.service }}:"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}"
          echo "  ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.run_number }}"

